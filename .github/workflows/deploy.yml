name: Run deploy
on:
  workflow_dispatch:
    inputs:
      deployment_type:
        required: true
        default: 'dev'
permissions: {}  # Set permissions at the job level

jobs:
  deploy_prod:
    if: github.event.inputs.deployment_type == 'prod'
    runs-on: ubuntu-latest
    environment: production
    env:
      BRANCH: 'main'
      PYPI_SITE: ''
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
    steps: &deployment_steps
    - uses: actions/checkout@v5
      with:
        ref: ${{ env.BRANCH }}
        persist-credentials: false

    - name: Install workflow dependencies
      run:  pip install rust-just twine

    - name: Run tests
      run:  just test

    - name: Run build
      run:  just build

    - name: Publish PyPI Release
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        export VERSION=$(sed -En 's|loadconfig ([0-9.dev]+) .+|\1|p' build/notes.md)
        twine upload ${{ env.PYPI_SITE }} build/wheel/loadconfig*

    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export VERSION=$(sed -En 's|loadconfig ([0-9.dev]+) .+|\1|p' build/notes.md)
        cp build/wheel/loadconfig-*.whl build/wheel/loadconfig-0.0.0-py3-none-any.whl
        gh release create "$VERSION" -F build/notes.md build/wheel/loadconfig-*.whl
        rm build/wheel/loadconfig-0.0.0*.whl


  deploy_dev:
    if: github.event.inputs.deployment_type == 'dev'
    runs-on: ubuntu-latest
    environment: development
    env:
      BRANCH: 'dev'
      PYPI_SITE: '-r testpypi'
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
    steps: *deployment_steps
